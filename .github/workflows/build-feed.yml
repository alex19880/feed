name: Build RSS feed

on:
  schedule:
    # Dos veces al día (00:00 y 12:00 UTC). Ajusta el cron a tu gusto.
    - cron: "0 */12 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "series.yaml"
      - "generate_feed.py"
      - ".github/workflows/build-feed.yml"

permissions:
  contents: write

concurrency:
  group: build-feed
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Generar feed RSS
        run: python generate_feed.py --config series.yaml --output-dir docs --state state.json

      - name: Commitear feed + estado
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A docs state.json
          if git diff --staged --quiet; then
            echo "Sin cambios."
          else
            git commit -m "chore: actualizar feed RSS"
            git push
          fi
