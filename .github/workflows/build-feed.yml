name: Build RSS feed

on:
  schedule:
    - cron: "0 */12 * * *"      # cada 12 h
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "series.yaml"
      - "generate_feed.py"
      - ".github/workflows/build-feed.yml"

permissions:
  contents: write     # commitear state.json (first-seen)
  pages: write        # publicar en Pages
  id-token: write     # requerido por deploy-pages

concurrency:
  group: build-feed
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Generar feed + panel
        run: python generate_feed.py --config series.yaml --output-dir docs --state state.json

      - name: Guardar estado first-seen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          if git diff --staged --quiet; then
            echo "Sin cambios de estado."
          else
            git commit -m "chore: estado first-seen"
            git push
          fi

      - name: Subir artefacto de Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
