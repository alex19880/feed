# =============================================================================
# Series a monitorear  →  genera UN feed RSS combinado (docs/feed.xml)
# =============================================================================
# Solo necesitas editar este archivo: añade o quita series.
# El script consulta MangaDex (API oficial) y Novelcool (HTML) y publica
# un único feed con los capítulos más recientes de TODAS las series.
# =============================================================================

settings:
  site_url: "https://alex19880.github.io/feed"  # tu GitHub Pages
  feed_title: "Mis Mangas y Novelas - Capítulos nuevos"
  feed_description: "Capítulos nuevos de las series que sigo (MangaDex + Novelcool)"
  max_items: 100            # nº de capítulos que muestra el feed combinado
  per_series_fetch: 5       # cuántos capítulos recientes consulta por serie
  mangadex_languages: ["es-la", "es", "en"]   # idiomas preferidos (en orden)

